const COMPANIONS = [
  {key:'family', label:'가족과'}, {key:'parents', label:'부모님과'},
  {key:'couple', label:'연인과'}, {key:'friends', label:'친구와'},
  {key:'solo', label:'나홀로'}
];
const TAB_ATTRS = {
  family:  [{k:'hotel',label:'숙소 편의'},{k:'leisure',label:'일정 여유'},{k:'move',label:'이동 부담↓'},{k:'meal',label:'식사 구성'}],
  parents: [{k:'hotel',label:'숙소 편의'},{k:'meal',label:'식사 구성'},{k:'move',label:'이동 부담↓'},{k:'leisure',label:'일정 여유'}],
  couple:  [{k:'photo',label:'사진포인트'},{k:'meal',label:'미식 경험'},{k:'hotel',label:'호텔 매력'},{k:'leisure',label:'자유시간'}],
  friends: [{k:'photo',label:'사진포인트'},{k:'meal',label:'미식 경험'},{k:'leisure',label:'일정 여유'},{k:'cost',label:'비용 부담↓'}],
  solo:    [{k:'leisure',label:'일정 여유'},{k:'move',label:'이동 부담↓'},{k:'photo',label:'사진포인트'},{k:'cost',label:'비용 부담↓'}]
};
const FIT_WEIGHTS = {
  family:  {hotel:.25, meal:.15, leisure:.20, move:.25, photo:.05, cost:.10},
  parents: {hotel:.25, meal:.25, leisure:.15, move:.25, photo:.05, cost:.05},
  couple:  {hotel:.20, meal:.20, leisure:.15, move:.05, photo:.30, cost:.10},
  friends: {hotel:.10, meal:.20, leisure:.15, move:.05, photo:.30, cost:.20},
  solo:    {hotel:.10, meal:.10, leisure:.25, move:.15, photo:.20, cost:.20}
};
const GRADE_LABEL = {low:'여유', mid:'보통', high:'많음', free:'자유'};
const GRADE_STEPS = {low:'~8천 보', mid:'8천~1만5천 보', high:'1만5천 보 이상'};
const FIT_LABEL = s => s>=4.4 ? '잘 맞아요' : s>=3.9 ? '무난해요' : '꼼꼼히 확인해 보세요'; // v2.1 라벨 컷

let comp = 'family', idx = 0;
/* v2.1: raw 점수(변별·운영용)와 표시 점수(커머스 별점 문법) 분리
   표시 별점 = 3.0 + raw×2.0 → 범위 3.0~5.0 (0.5 단위) — 약점도 3.0으로 표기 */
const dispStar = r => Math.min(5, Math.max(3, Math.round((3+r*2)*2)/2));
const stars = n => Array.from({length:5},(_,i)=> i<Math.floor(n) ? '★' : (i<n ? '<span class="half">★</span>' : '<span class="off">★</span>')).join('');
/* 종합 FIT: raw = Σ(가중치×속성) + 동행 보정 → 표시 = 3.0 + raw×2.0 (0.1 단위) */
const fitScore = (a,c,mods) => {
  const raw = Math.min(1, Math.max(0, Object.keys(FIT_WEIGHTS[c]).reduce((t,k)=>t+a[k]*FIT_WEIGHTS[c][k],0) + (mods?mods[c].v:0)));
  return Math.min(5, Math.max(3, Math.round((3+raw*2)*10)/10));
};

function head(c){ return `<div class="card-no">CARD ${c.no}</div><div class="card-title">${c.title}</div><div class="card-sub">${c.sub}</div>`; }

function slideHtml(c){
  const m = PAYLOAD.meta;
  switch(c.type){
    case 'risks':
      return `<div class="slide">${head(c)}<div class="risk-intro">좋은 점만 모은 게 아니에요. AI가 데이터에서 함께 살펴봤어요.</div>${c.items.map(r=>`<div class="risk-row"><div class="risk-ico">⚠️</div><div class="risk-tx"><div class="risk-t">${r.txt}</div>${r.note?`<div class="risk-n">${r.note}</div>`:''}</div></div>`).join('')}</div>`;
    case 'qa':
      return `<div class="slide">${head(c)}${c.items.map(i=>`<div class="qa-item"><div class="qa-q">${i.q}</div><div class="qa-a">${i.a}</div></div>`).join('')}</div>`;
    case 'main':
      return `<div class="slide s-main">${head(c)}<div class="hook">${c.hook}</div>
        <div class="main-box"><div class="main-name">${m.name}</div>
        <div class="meta-row"><span class="meta-chip brand" style="background:${m.brandColor};border-color:${m.brandColor}">${m.brand}</span><span class="meta-chip">${m.duration}</span><span class="meta-chip">${PAYLOAD.productCode}</span></div>
        <div class="info-row"><span class="ic">📅</span><span>${m.dates}</span></div>
        <div class="info-row"><span class="ic">✈️</span><span>${m.flights.out}<br>${m.flights.in}</span></div>
        <div class="price">${m.price.amount}원~ <small>${m.price.basis}</small></div>
        ${m.priceNote?`<div class="price-note">! ${m.priceNote}</div>`:''}</div></div>`;
    case 'highlights':
      return `<div class="slide">${head(c)}
        <div class="tag-row">${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        ${c.items.map((h,i)=>`<div class="hl-item"><span class="num">${String(i+1).padStart(2,'0')}</span><div class="hl-body"><span class="hl-label">${h.label}</span><div class="txt">${h.txt}</div></div></div>`).join('')}</div>`;
    case 'fit':
      return `<div class="slide" id="fitSlide">${head(c)}<div id="fitBody"></div></div>`;
    case 'checkpoints':
      return `<div class="slide">${head(c)}${c.groups.map(g=>`<div class="chk-group"><div class="g-title">${g.title}</div>${g.items.map(i=>`<div class="chk-item ${i.type}"><span class="ico">${i.type==='pos'?'✓':'!'}</span><span>${i.text}</span></div>`).join('')}</div>`).join('')}</div>`;
    case 'schedule': {
      const legend = `<div class="free-note"><span class="grade free">자유</span><span>= 종일 자유일정 (별도 색상)</span></div>
        <div class="legend">${['low','mid','high'].map(g=>`<div class="leg"><span class="grade ${g}">${GRADE_LABEL[g]}</span><div class="steps">${GRADE_STEPS[g]}</div></div>`).join('')}</div>
        <div class="legend-note">* 일정 구성 기반 추정 기준이에요</div>`;
      if(c.days.length <= 7){
        return `<div class="slide">${head(c)}${legend}
          <div class="day-list">${c.days.map(d=>`<div class="day-row"><div class="day-col"><div class="d">D${d.d}</div><span class="grade ${d.grade}">${GRADE_LABEL[d.grade]}</span></div><div class="day-body"><div class="day-route">${d.route}</div>${d.msg?`<div class="day-msg">· ${d.msg}</div>`:''}</div></div>`).join('')}</div></div>`;
      }
      return `<div class="slide">${head(c)}${legend}
        <div class="hm-bar" id="hmBar"></div>
        <div class="hm-detail" id="hmDetail"></div>
        <div class="hm-hint">일차를 탭하면 상세 동선과 팁이 보여요</div></div>`;
    }
  }
}

function endSlide(){
  return `<div class="slide s-end">
    <div class="logo"><span class="h">hana</span>tour</div>
    <div class="slogan">꿈꾸는 대로, 펼쳐지다</div>
    <div class="notice"><b>H-AI가 상품 데이터를 해석한 참고 정보예요.</b><br>예약 전 상품 상세를 꼭 확인하세요.<br><br>별점·FIT은 상품 데이터 기반 산출값으로<br>개인 만족도와 다를 수 있어요.<br>활동량은 일정 구성 기반 추정이며,<br>호텔·일정·경비는 변경될 수 있어요.<br><br>* 실제 API 캡처 데이터(2026.4.2) 기반 샘플이에요.</div>
    <a class="cta" href="#" onclick="return false;">상품 상세 보기</a></div>`;
}

function renderFit(){
  const c = PAYLOAD.cards.find(x=>x.type==='fit');
  const m = PAYLOAD.meta;
  const fit = fitScore(c.attrs01, comp, c.mods);
  const label = COMPANIONS.find(x=>x.key===comp).label;
  document.getElementById('fitBody').innerHTML =
    `<div class="comp-tabs">${COMPANIONS.map(x=>`<button class="${x.key===comp?'on':''}" onclick="setComp('${x.key}')">${x.label}</button>`).join('')}</div>
     <div class="fit-score"><span class="num">★${fit.toFixed(1)}<small> /5</small></span><span class="lbl">${FIT_LABEL(fit)}</span><span class="cap">${label} 여행 기준<br>종합 FIT</span></div>
     <div class="star-box">${TAB_ATTRS[comp].map(a=>
       `<div class="star-row"><span class="attr">${a.label}<button class="info-btn" onclick="toggleTip(event,'${a.k}')">i</button><span class="tip" id="tip-${a.k}">${c.tips[a.k]}</span></span><span class="stars">${stars(dispStar(c.attrs01[a.k]))}</span></div>`).join('')}</div>
     <div class="fit-comment">${c.comments[comp]}</div>`;
}
function setComp(k){ comp=k; renderFit(); }

let dayIdx = 0;
function renderHm(){
  const c = PAYLOAD.cards.find(x=>x.type==='schedule');
  if(!c || c.days.length <= 7) return;
  const bar = document.getElementById('hmBar');
  bar.style.gridTemplateColumns = `repeat(${Math.min(c.days.length, 10)}, 1fr)`;
  bar.innerHTML = c.days.map((d,i)=>
    `<div class="hm-cell${i===dayIdx?' sel':''}" onclick="setDay(${i})"><div class="blk ${d.grade}">D${d.d}</div></div>`).join('');
  const d = c.days[dayIdx];
  document.getElementById('hmDetail').innerHTML =
    `<div class="hm-day">DAY ${d.d}<span class="grade ${d.grade}">${GRADE_LABEL[d.grade]}</span></div>
     <div class="hm-route">${d.route}</div>${d.msg?`<div class="hm-msg">· ${d.msg}</div>`:''}`;
}
function setDay(i){ dayIdx=i; renderHm(); }

function toggleTip(e,k){
  e.stopPropagation();
  document.querySelectorAll('.tip').forEach(t=>{ if(t.id!=='tip-'+k) t.classList.remove('show'); });
  document.getElementById('tip-'+k).classList.toggle('show');
}
document.addEventListener('click', ()=>document.querySelectorAll('.tip').forEach(t=>t.classList.remove('show')));

const vp = document.getElementById('vp');
const TOTAL = PAYLOAD.cards.length + 1;
vp.innerHTML = PAYLOAD.cards.map(slideHtml).join('') + endSlide();
renderFit();
renderHm();
document.getElementById('dots').innerHTML = Array.from({length:TOTAL},(_,i)=>`<span class="dot${i===0?' on':''}" onclick="go(${i})"></span>`).join('');
document.getElementById('counter').textContent = '01 / '+String(TOTAL).padStart(2,'0');

function sync(){
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on', i===idx));
  document.getElementById('counter').textContent = String(idx+1).padStart(2,'0')+' / '+String(TOTAL).padStart(2,'0');
}
function go(i){
  idx = Math.max(0, Math.min(TOTAL-1, i));
  vp.scrollTo({left: idx*390, behavior:'smooth'});
  sync();
}
vp.addEventListener('scroll', ()=>{
  const i = Math.round(vp.scrollLeft/390);
  if(i!==idx){ idx=i; sync(); }
});
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') go(idx+1);
  if(e.key==='ArrowLeft') go(idx-1);
});
</script>
